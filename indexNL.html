<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Space+Grotesk:wght@700&display=swap');

  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg-deep: #0a0e1a;
    --bg-panel: #111827;
    --bg-card: #1a2236;
    --bg-hover: #243050;
    --accent-blue: #3b82f6;
    --accent-cyan: #22d3ee;
    --accent-orange: #f97316;
    --accent-red: #ef4444;
    --accent-purple: #a855f7;
    --text-primary: #f1f5f9;
    --text-secondary: #94a3b8;
    --text-dim: #64748b;
    --border: #1e293b;
    --glow: rgba(59, 130, 246, 0.15);
  }

  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--bg-deep);
    color: var(--text-primary);
    min-height: 100vh;
    overflow-x: hidden;
  }

  .header {
    text-align: center;
    padding: 2rem 1rem 1rem;
    position: relative;
  }
  .header::after {
    content: '';
    position: absolute;
    bottom: 0;
    left: 50%;
    transform: translateX(-50%);
    width: 80%;
    max-width: 600px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--accent-orange), transparent);
  }
  .header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: clamp(1.6rem, 5vw, 2.4rem);
    font-weight: 700;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    background: linear-gradient(135deg, var(--text-primary), var(--accent-orange));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header .flag { font-size: clamp(1.2rem, 4vw, 1.8rem); }
  .header .count {
    font-size: 0.8rem;
    color: var(--text-dim);
    margin-top: 0.3rem;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .lang-switch {
    display: inline-flex;
    align-items: center;
    gap: 0.35rem;
    margin-top: 0.5rem;
    padding: 0.35rem 0.8rem;
    border: 1px solid var(--accent-orange);
    border-radius: 6px;
    background: rgba(249,115,22,0.1);
    color: var(--accent-orange);
    font-size: 0.72rem;
    font-weight: 700;
    text-decoration: none;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    transition: all 0.2s;
  }
  .lang-switch:hover {
    background: var(--accent-orange);
    color: #fff;
  }

  .gh-link {
    display: inline-flex;
    align-items: center;
    gap: 0.3rem;
    margin-top: 0.5rem;
    margin-left: 0.4rem;
    padding: 0.35rem 0.7rem;
    border: 1px solid var(--border);
    border-radius: 6px;
    background: var(--bg-panel);
    color: var(--text-dim);
    font-size: 0.7rem;
    font-weight: 600;
    text-decoration: none;
    transition: all 0.2s;
  }
  .gh-link:hover {
    color: var(--text-primary);
    border-color: var(--text-dim);
    background: var(--bg-hover);
  }

  .help-banner {
    max-width: 720px;
    margin: 1rem auto 0;
    padding: 0 1rem;
  }
  .help-toggle {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 0.4rem;
    width: 100%;
    padding: 0.5rem 1rem;
    border: 1px solid var(--border);
    border-radius: 10px;
    background: var(--bg-panel);
    color: var(--accent-cyan);
    font-size: 0.78rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }
  .help-toggle:hover { background: var(--bg-hover); border-color: var(--accent-cyan); }
  .help-toggle .arrow { transition: transform 0.25s; font-size: 0.65rem; }
  .help-toggle.open .arrow { transform: rotate(180deg); }
  .help-content {
    overflow: hidden; max-height: 0; opacity: 0;
    transition: max-height 0.35s ease, opacity 0.25s ease, margin 0.25s ease;
    margin-top: 0;
  }
  .help-content.open { max-height: 320px; opacity: 1; margin-top: 0.6rem; }
  .help-card {
    background: var(--bg-card); border: 1px solid var(--border);
    border-radius: 10px; padding: 1rem 1.2rem;
  }
  .help-card p { font-size: 0.82rem; color: var(--text-secondary); line-height: 1.55; margin-bottom: 0.8rem; }
  .help-card p strong { color: var(--text-primary); }
  .help-card .vlc-label {
    font-size: 0.68rem; font-weight: 700; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--text-dim); margin-bottom: 0.45rem;
  }
  .vlc-links { display: flex; gap: 0.4rem; flex-wrap: wrap; }
  .vlc-links a {
    display: inline-flex; align-items: center; gap: 0.3rem;
    padding: 0.4rem 0.8rem; border: 1px solid var(--border); border-radius: 6px;
    background: var(--bg-panel); color: var(--text-primary);
    font-size: 0.75rem; font-weight: 600; text-decoration: none; transition: all 0.15s;
  }
  .vlc-links a:hover { background: var(--accent-blue); border-color: var(--accent-blue); color: #fff; }
  .vlc-links a .dl-icon { font-size: 0.85rem; }

  .search-wrap {
    max-width: 720px; margin: 1.2rem auto 0; padding: 0 1rem; position: relative;
  }
  .search-wrap input {
    width: 100%; padding: 0.65rem 1rem 0.65rem 2.6rem;
    border: 1px solid var(--border); border-radius: 10px;
    background: var(--bg-panel); color: var(--text-primary);
    font-size: 0.9rem; outline: none; transition: border-color 0.2s;
  }
  .search-wrap input:focus { border-color: var(--accent-orange); box-shadow: 0 0 0 3px rgba(249,115,22,0.15); }
  .search-wrap::before {
    content: '\2315'; position: absolute; left: 1.8rem; top: 50%;
    transform: translateY(-50%); color: var(--text-dim); font-size: 1.1rem; pointer-events: none;
  }

  .cat-bar {
    display: flex; justify-content: center; gap: 0.45rem;
    padding: 1.2rem 0.8rem 0.6rem; flex-wrap: wrap; max-width: 720px; margin: 0 auto;
  }
  .cat-btn {
    display: inline-flex; align-items: center; gap: 0.35rem;
    padding: 0.5rem 1rem; border: 1px solid var(--border); border-radius: 8px;
    background: var(--bg-panel); color: var(--text-secondary);
    font-size: 0.78rem; font-weight: 600; letter-spacing: 0.04em;
    text-transform: uppercase; cursor: pointer; transition: all 0.2s; user-select: none;
  }
  .cat-btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--accent-orange); }
  .cat-btn.active {
    background: var(--accent-orange); color: #fff; border-color: var(--accent-orange);
    box-shadow: 0 2px 12px rgba(249,115,22,0.3);
  }
  .cat-btn .icon { font-size: 1rem; }
  .cat-btn .badge {
    background: rgba(255,255,255,0.15); padding: 0.1rem 0.4rem;
    border-radius: 4px; font-size: 0.65rem; font-weight: 700;
  }
  .cat-btn.active .badge { background: rgba(255,255,255,0.25); }

  .subcat-bar {
    max-width: 720px; margin: 0 auto; padding: 0.3rem 0.8rem 0.8rem;
    display: flex; gap: 0.35rem; flex-wrap: wrap; justify-content: center;
    min-height: 0; overflow: hidden; transition: opacity 0.25s, max-height 0.35s;
  }
  .subcat-bar.hidden { opacity: 0; max-height: 0; padding: 0 0.8rem; }
  .sub-btn {
    padding: 0.35rem 0.75rem; border: 1px solid var(--border); border-radius: 20px;
    background: var(--bg-card); color: var(--text-dim); font-size: 0.7rem;
    font-weight: 600; cursor: pointer; transition: all 0.2s; user-select: none; white-space: nowrap;
  }
  .sub-btn:hover { background: var(--bg-hover); color: var(--text-primary); border-color: var(--text-dim); }
  .sub-btn.active { background: var(--accent-cyan); color: var(--bg-deep); border-color: var(--accent-cyan); }

  .list-header {
    max-width: 720px; margin: 0 auto; padding: 0.4rem 1.2rem;
    display: flex; justify-content: space-between; align-items: center;
  }
  .list-header .showing { font-size: 0.75rem; color: var(--text-dim); letter-spacing: 0.03em; }
  .list-header .showing strong { color: var(--accent-cyan); font-weight: 700; }

  .channel-list { max-width: 720px; margin: 0 auto; padding: 0 0.8rem 4rem; }

  .group-label {
    padding: 0.8rem 0.6rem 0.3rem; font-size: 0.65rem; font-weight: 700;
    letter-spacing: 0.1em; text-transform: uppercase; color: var(--accent-orange);
    border-bottom: 1px solid var(--border); margin-bottom: 0.2rem;
    position: sticky; top: 0; background: var(--bg-deep); z-index: 5;
  }

  .channel-item {
    display: flex; align-items: center; gap: 0.7rem; padding: 0.6rem;
    border-radius: 8px; cursor: pointer; transition: background 0.15s;
    text-decoration: none; color: inherit;
  }
  .channel-item:hover { background: var(--bg-hover); }

  .ch-icon {
    width: 36px; height: 36px; border-radius: 6px; background: var(--bg-card);
    border: 1px solid var(--border); display: flex; align-items: center;
    justify-content: center; font-size: 0.7rem; font-weight: 700;
    color: var(--accent-orange); flex-shrink: 0; text-transform: uppercase;
    letter-spacing: -0.02em; overflow: hidden;
  }

  .ch-info { flex: 1; min-width: 0; }
  .ch-name {
    font-size: 0.85rem; font-weight: 600; color: var(--text-primary);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
  }
  .ch-meta { font-size: 0.68rem; color: var(--text-dim); margin-top: 0.1rem; display: flex; gap: 0.5rem; align-items: center; }
  .ch-res { color: var(--accent-cyan); font-weight: 600; }
  .ch-tag {
    background: rgba(168,85,247,0.15); color: var(--accent-purple);
    padding: 0.1rem 0.35rem; border-radius: 3px; font-size: 0.6rem; font-weight: 600;
  }
  .ch-geo {
    background: rgba(239,68,68,0.12); color: #f87171;
    padding: 0.1rem 0.35rem; border-radius: 3px; font-size: 0.6rem; font-weight: 600;
  }

  .ch-play {
    width: 28px; height: 28px; border-radius: 50%; background: var(--accent-orange);
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; opacity: 0; transform: scale(0.8); transition: all 0.15s;
  }
  .ch-play svg { width: 12px; height: 12px; fill: #fff; margin-left: 1px; }
  .channel-item:hover .ch-play { opacity: 1; transform: scale(1); }

  .no-results { text-align: center; padding: 3rem 1rem; color: var(--text-dim); font-size: 0.9rem; }
  .no-results .big { font-size: 2rem; margin-bottom: 0.5rem; }

  .btt {
    position: fixed; bottom: 1.2rem; right: 1.2rem; width: 40px; height: 40px;
    border-radius: 50%; background: var(--accent-orange); border: none; color: #fff;
    font-size: 1.2rem; cursor: pointer; box-shadow: 0 4px 16px rgba(249,115,22,0.4);
    opacity: 0; transform: translateY(10px); transition: all 0.25s; z-index: 20;
  }
  .btt.visible { opacity: 1; transform: translateY(0); }

  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-deep); }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

  @media (max-width: 480px) {
    .cat-btn { padding: 0.4rem 0.7rem; font-size: 0.7rem; }
    .cat-btn .badge { display: none; }
    .ch-icon { width: 32px; height: 32px; font-size: 0.6rem; }
  }
</style>
</head>

const allChannels = [];
for (const [cat, subs] of Object.entries(DATA)) {
  for (const [sub, items] of Object.entries(subs)) {
    for (const ch of items) {
      allChannels.push({ ...ch, category: cat, subcategory: sub });
    }
  }
}

function parseName(raw) {
  let name = raw, res = null, geo = false, not247 = false;
  const resMatch = name.match(/\((\d+p)\)/);
  if (resMatch) { res = resMatch[1]; name = name.replace(resMatch[0], '').trim(); }
  if (name.includes('[Geo-blocked]')) { geo = true; name = name.replace('[Geo-blocked]', '').trim(); }
  if (name.includes('[Not 24/7]')) { not247 = true; name = name.replace('[Not 24/7]', '').trim(); }
  return { name, res, geo, not247 };
}

function abbrev(name) {
  const known = {'RTV':'RTV','DTV':'DTV','PBS':'PBS','NH ':'NH','AT5':'AT5','OOG':'OOG','WOS':'WOS','SBS':'SBS','BNR':'BNR','ZFM':'ZFM','RCN':'RCN','LON':'LON','HTR':'HTR','RPL':'RPL'};
  for (const [k,v] of Object.entries(known)) { if (name.toUpperCase().startsWith(k)||name.includes(k)) return v; }
  const words = name.replace(/[^a-zA-Z0-9\s]/g,'').split(/\s+/).filter(Boolean);
  if (words.length===1) return words[0].substring(0,3).toUpperCase();
  return words.slice(0,3).map(w=>w[0]).join('').toUpperCase();
}

function renderCatBar() {
  const bar = document.getElementById('catBar');
  const cats = Object.keys(CAT_META).sort((a,b) => CAT_META[a].order - CAT_META[b].order);
  let html = '<button class="cat-btn '+(activeCat===null?'active':'')+'" data-cat="ALL"><span class="icon">\ud83d\udce1</span> ALLES <span class="badge">'+allChannels.length+'</span></button>';
  for (const cat of cats) {
    if (!DATA[cat]) continue;
    const count = Object.values(DATA[cat]).reduce((s,arr)=>s+arr.length,0);
    html += '<button class="cat-btn '+(activeCat===cat?'active':'')+'" data-cat="'+cat+'"><span class="icon">'+CAT_META[cat].icon+'</span> '+CAT_META[cat].label+' <span class="badge">'+count+'</span></button>';
  }
  bar.innerHTML = html;
  bar.querySelectorAll('.cat-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeCat = btn.dataset.cat==='ALL'?null:btn.dataset.cat;
      activeSub = null;
      renderCatBar(); renderSubBar(); renderList();
    });
  });
}

function renderSubBar() {
  const bar = document.getElementById('subBar');
  if (!activeCat || !DATA[activeCat]) { bar.classList.add('hidden'); bar.innerHTML=''; return; }
  bar.classList.remove('hidden');
  const subs = Object.keys(DATA[activeCat]);
  const order = SUBCAT_ORDER[activeCat]||subs;
  const sorted = [...subs].sort((a,b) => {
    const ai=order.indexOf(a), bi=order.indexOf(b);
    return (ai===-1?999:ai)-(bi===-1?999:bi);
  });
  let html = '<button class="sub-btn '+(activeSub===null?'active':'')+'" data-sub="ALL">Alles</button>';
  for (const sub of sorted) {
    const count = DATA[activeCat][sub].length;
    html += '<button class="sub-btn '+(activeSub===sub?'active':'')+'" data-sub="'+sub+'">'+sub+' <span style="opacity:0.6">'+count+'</span></button>';
  }
  bar.innerHTML = html;
  bar.querySelectorAll('.sub-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      activeSub = btn.dataset.sub==='ALL'?null:btn.dataset.sub;
      renderSubBar(); renderList();
    });
  });
}

function renderList() {
  const container = document.getElementById('channelList');
  const label = document.getElementById('showingLabel');
  const q = searchQuery.toLowerCase().trim();
  let filtered = allChannels;
  if (activeCat) filtered = filtered.filter(c=>c.category===activeCat);
  if (activeSub) filtered = filtered.filter(c=>c.subcategory===activeSub);
  if (q) filtered = filtered.filter(c=>c.name.toLowerCase().includes(q));

  label.innerHTML = 'Toont <strong>'+filtered.length+'</strong> zender'+(filtered.length!==1?'s':'');

  if (filtered.length===0) {
    container.innerHTML = '<div class="no-results"><div class="big">\ud83d\udce1</div>Geen zenders gevonden</div>';
    return;
  }

  const groups = new Map();
  for (const ch of filtered) {
    let key;
    if (activeCat && !q) { key = ch.subcategory; }
    else { key = (CAT_META[ch.category]?.icon||'')+' '+CAT_META[ch.category]?.label; }
    if (!groups.has(key)) groups.set(key,[]);
    groups.get(key).push(ch);
  }

  let sortedKeys;
  if (activeCat && !q) {
    const order = SUBCAT_ORDER[activeCat]||[];
    sortedKeys = [...groups.keys()].sort((a,b) => {
      const ai=order.indexOf(a), bi=order.indexOf(b);
      return (ai===-1?999:ai)-(bi===-1?999:bi);
    });
  } else {
    const catOrder = Object.keys(CAT_META);
    sortedKeys = [...groups.keys()].sort((a,b) => {
      const ac=catOrder.findIndex(c=>a.includes(CAT_META[c]?.label||''));
      const bc=catOrder.findIndex(c=>b.includes(CAT_META[c]?.label||''));
      return ac-bc;
    });
  }

  let html = '';
  for (const key of sortedKeys) {
    const items = groups.get(key);
    html += '<div class="group-label">'+key+' \u00b7 '+items.length+'</div>';
    for (const ch of items) {
      const p = parseName(ch.name);
      const ab = abbrev(p.name);
      html += '<a class="channel-item" href="'+ch.url+'" target="_blank" rel="noopener">' +
        '<div class="ch-icon">'+ab+'</div>' +
        '<div class="ch-info">' +
          '<div class="ch-name">'+p.name+'</div>' +
          '<div class="ch-meta">' +
            (p.res?'<span class="ch-res">'+p.res+'</span>':'') +
            '<span class="ch-tag">'+ch.subcategory+'</span>' +
            (p.geo?'<span class="ch-geo">Geblokkeerd</span>':'') +
            (p.not247?'<span class="ch-geo">Niet 24/7</span>':'') +
          '</div>' +
        '</div>' +
        '<div class="ch-play"><svg viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg></div>' +
      '</a>';
    }
  }
  container.innerHTML = html;
}

document.getElementById('search').addEventListener('input', (e) => {
  searchQuery = e.target.value;
  if (searchQuery.trim()) { activeCat=null; activeSub=null; renderCatBar(); renderSubBar(); }
  renderList();
});

window.addEventListener('scroll', () => {
  document.getElementById('btt').classList.toggle('visible', window.scrollY>600);
});

renderCatBar(); renderSubBar(); renderList();
</script>
</body>
</html>
